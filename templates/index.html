<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Quiz Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
<div class="container">
<span class="navbar-brand fw-bold">AI Quiz Generator</span>
</div>
</nav>

<section class="hero-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card app-card">

<h2 class="title">Generate AI Quiz</h2>

<form action="/generate" method="POST">

<div class="mb-4">

<label class="form-label">Quiz Topic</label>

<input type="text" name="topic" class="form-control" placeholder="Example: Machine Learning" required>

</div>

<div class="mb-4">

<label class="form-label">Number of Questions</label>

<input type="number" name="num_questions" class="form-control" placeholder="Example: 5" required>

</div>

<button class="btn btn-primary w-100 btn-lg">
Generate Quiz
</button>

</form>

</div>

</div>

</div>

</div>

</section>

</body>
</html>
